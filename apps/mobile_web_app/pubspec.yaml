name: speakup
description: AI Communication Coach & Interview Trainer
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^14.0.2

  # ── Networking ──────────────────────────────────────────────────────────────
  dio: ^5.4.3

  # ── Supabase ────────────────────────────────────────────────────────────────
  supabase_flutter: ^2.5.0

  # ── Audio ───────────────────────────────────────────────────────────────────
  flutter_sound: ^9.2.13 # Microphone recording
  just_audio: ^0.9.38 # Audio playback

  # ── Charts ──────────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Typography ──────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Local Storage / Offline ─────────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Permissions & Connectivity ──────────────────────────────────────────────
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3

  # ── Utilities ───────────────────────────────────────────────────────────────
  intl: ^0.19.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
